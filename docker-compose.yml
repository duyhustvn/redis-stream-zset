services:
  redis_stream_zset:
    image: redis-stream-zset:1.0.0
    container_name: redis-stream-set
    ports:
      - 8081:8081

  redis:
    image: redis:8
    container_name: redis
    command: >
      sh -c 'export $$(cat /run/secrets/redis_secret | xargs) && 
      redis-server 
      --requirepass "$$REDIS_PW" 
      --save 60 1 
      --appendonly yes'
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'export $$(cat /run/secrets/multi_secrets | xargs) && redis-cli -a "$$REDIS_PW" ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

secrets:
  redis_secret:
    file: ./redis_secret

volumes:
  redis_data:
